org: sergioricce
service: api-productos

provider:
  name: aws
  runtime: nodejs18.x
  memorySize: 1024
  timeout: 30
  iam:
    role: arn:aws:iam::342927925152:role/LabRole
  environment:
    PRODUCTS_TABLE: t_productos_${sls:stage}
    TOKENS_TABLE: t_tokens_acceso
    FIREHOSE_STREAM: firehose-productos-${sls:stage}

functions:
  ListarProductos:
    handler: src/ListarProductos.ListarProductos
    events:
      - http:
          path: productos/listar
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                { "headers": { 
                    #foreach($h in $input.params().header.keySet())
                    "$h":"$util.escapeJavaScript($input.params().header.get($h))"#if($foreach.hasNext),#end
                    #end
                  },
                  "body": $input.json('$')
                }
          response:
            statusCodes:
              200:
                pattern: ''
                template: $input.body

  CrearProducto:
    handler: src/CrearProducto.CrearProducto
    events:
      - http:
          path: productos/crear
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                { "headers": { 
                    #foreach($h in $input.params().header.keySet())
                    "$h":"$util.escapeJavaScript($input.params().header.get($h))"#if($foreach.hasNext),#end
                    #end
                  },
                  "body": $input.json('$')
                }
          response:
            statusCodes:
              200:
                pattern: ''
                template: $input.body

  BuscarProducto:
    handler: src/BuscarProducto.BuscarProducto
    events:
      - http:
          path: productos/buscar
          method: post
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                { "headers": { 
                    #foreach($h in $input.params().header.keySet())
                    "$h":"$util.escapeJavaScript($input.params().header.get($h))"#if($foreach.hasNext),#end
                    #end
                  },
                  "body": $input.json('$')
                }
          response:
            statusCodes:
              200:
                pattern: ''
                template: $input.body

  ModificarProducto:
    handler: src/ModificarProducto.ModificarProducto
    events:
      - http:
          path: productos/modificar
          method: put
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                { "headers": { 
                    #foreach($h in $input.params().header.keySet())
                    "$h":"$util.escapeJavaScript($input.params().header.get($h))"#if($foreach.hasNext),#end
                    #end
                  },
                  "body": $input.json('$')
                }
          response:
            statusCodes:
              200:
                pattern: ''
                template: $input.body

  EliminarProducto:
    handler: src/EliminarProducto.EliminarProducto
    events:
      - http:
          path: productos/eliminar
          method: delete
          cors: true
          integration: lambda
          request:
            template:
              application/json: |
                { "headers": { 
                    #foreach($h in $input.params().header.keySet())
                    "$h":"$util.escapeJavaScript($input.params().header.get($h))"#if($foreach.hasNext),#end
                    #end
                  },
                  "body": $input.json('$')
                }
          response:
            statusCodes:
              200:
                pattern: ''
                template: $input.body

  actualizarProductos:
    handler: src/actualizarProductos.handler
    description: Procesa DynamoDB Stream y envía a Kinesis Data Firehose
    events:
      - stream:
          type: dynamodb
          arn:
            Fn::GetAtt:
              - ProductsDynamoDBTable
              - StreamArn
          batchSize: 100
          startingPosition: LATEST

resources:
  Resources:
    ProductsDynamoDBTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: t_productos_${sls:stage}
        AttributeDefinitions:
          - AttributeName: tenant_id
            AttributeType: S
          - AttributeName: producto_id
            AttributeType: S
        KeySchema:
          - AttributeName: tenant_id
            KeyType: HASH
          - AttributeName: producto_id
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
    ProductosBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: productos-ingesta-${sls:stage}
    ProductosFirehose:
      Type: AWS::KinesisFirehose::DeliveryStream
      Properties:
        DeliveryStreamName: firehose-productos-${sls:stage}
        S3DestinationConfiguration:
          BucketARN: !GetAtt ProductosBucket.Arn
          RoleARN: arn:aws:iam::342927925152:role/LabRole
          BufferingHints:
            IntervalInSeconds: 60
            SizeInMBs: 5
    ProductsStreamPolicy:
      Type: AWS::IAM::Policy
      Properties:
        PolicyName: ProductsStreamPolicy
        Roles:
          - arn:aws:iam::342927925152:role/LabRole
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:DescribeStream
                - dynamodb:GetRecords
                - dynamodb:GetShardIterator
                - dynamodb:ListStreams
              Resource: !GetAtt ProductsDynamoDBTable.StreamArn
            - Effect: Allow
              Action:
                - firehose:PutRecord
                - firehose:PutRecordBatch
              Resource: !GetAtt ProductosFirehose.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - Fn::Join:
                    - ""
                    - - !GetAtt ProductosBucket.Arn
                      - "/*"

  Outputs:
    ProductsTableName:
      Value: !Ref ProductsDynamoDBTable
    FirehoseName:
      Value: !GetAtt ProductosFirehose.DeliveryStreamName
    IngestBucket:
      Value: !Ref ProductosBucket

